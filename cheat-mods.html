<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LING'S SIMS 4 MODS - 作弊模組</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="nav-menu">
        <a href="index.html">首頁</a> <span style="color: #eee;">/</span> <a href="#" style="color: #000;">作弊模組</a>
    </nav>

    <div class="mod-container">

        <div class="mod-card">
            <div class="preview-img"><img src="mccc.jpg" alt="MCCC Preview"></div>
            <div class="content">
                <h2 class="mod-header">MC Command Center (MCCC)</h2>
                <div class="author">BY <a href="https://www.patreon.com/c/mccc_deaderpool/posts?utm_source=campaign-search-results" target="_blank">Deaderpool</a></div>
                <div class="details">
                    <div class="info-row"><strong>檔案名稱 ｜</strong><a href="https://www.patreon.com/c/mccc_deaderpool/posts?utm_source=campaign-search-results">McCmdCenter_AllModules_2026_2_0.zip</a></div>
                    <div class="info-row"><strong>漢化版本 ｜</strong><a href="https://www.curseforge.com/sims4/translations/mc-command-center-by-deaderpool-chinese/files/all?page=1&pageSize=20&showAlphaFiles=hide">1_mc_cmd_center_liquor_CHS.zip</a>（簡中)</div>
                    <div class="info-row"><strong>備用載點 ｜</strong>無</div>
                    <div class="info-row"><strong>下載版本 ｜</strong>2026_2_0</div>
                    <div class="info-row"><strong>下載日期 ｜</strong>2026.05.06</div>
                </div>
            </div>
        </div>

        <div class="mod-card">
            <div class="preview-img"><img src="uicheats.jpg" alt="UI Preview"></div>
            <div class="content">
                <h2 class="mod-header">UI Cheats Extension</h2>
                <div class="author">BY <a href="https://www.patreon.com/weerbesu" target="_blank">weerbesu</a></div>
                <div class="details">
                    <div class="info-row"><strong>檔案名稱 ｜</strong><a href="#">UI_Cheats_Extension_v1.54.zip</a></div>
                    <div class="info-row"><strong>備用載點 ｜</strong>無</div>
                    <div class="info-row"><strong>下載版本 ｜</strong>v1.54</div>
                    <div class="info-row"><strong>下載日期 ｜</strong>2026.05.06</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        /* 滾動動畫腳本 */
        const observerOptions = { threshold: 0.1 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.mod-card').forEach(card => {
            observer.observe(card);
        });
    </script>
</body>
</html>
