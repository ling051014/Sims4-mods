<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI 美化類 - 模組整理</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="nav-menu">
        <a href="index.html">🏠 回首頁</a>
        <span>🎨 UI 美化分區</span>
    </nav>

    <div class="mod-container">

        <div class="mod-card reveal">
            <div class="mod-header">黑色UI介面</div>
            <div class="author">作者：<a href="#">vyxated</a></div>
            <div class="preview-img">
                <img src="IMG_3193.jpg" alt="預覽圖">
            </div>
            <div class="details">
                <div class="info-row"><strong>主檔案：</strong><a href="#">Chalk'd UI.zip</a></div>
                <div class="info-row"><strong>漢化：</strong><a href="#">點此下載</a></div>
                <div class="info-row"><strong>版本：</strong>2026-05-07 / v1.2</div>
            </div>
            <div class="notes">※ 刪除特定資料夾才可相容</div>
        </div>

        </div>

    <script>
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                if (elementTop < windowHeight - 100) {
                    reveals[i].classList.add("active");
                }
            }
        }
        window.addEventListener("scroll", reveal);
        reveal(); // 初始化
    </script>
</body>
</html>
