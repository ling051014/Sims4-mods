<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ling's Archive</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ④ 首頁專屬封面：現代寬屏感 */
        .home-banner {
            width: 100%;
            height: 300px; /* 固定高度 */
            object-fit: cover; /* 圖片自動裁切填滿，不變形 */
            margin-bottom: 50px;
        }

        .home-title {
            text-align: center;
            font-weight: 300; /* 細體字更有高級感 */
            letter-spacing: 4px;
            margin-bottom: 40px;
            text-transform: uppercase; /* 英文強制大寫（如果有英文字） */
        }

        .category-grid {
            display: grid;
            /* 響應式：手機 1 欄，平板以上 2-3 欄 */
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .cat-btn {
            background: #ffffff;
            padding: 30px 20px;
            text-align: center;
            border: 1px solid #eee;
            text-decoration: none;
            color: #444;
            font-size: 14px;
            transition: 0.3s;
        }
        .cat-btn:hover {
            border-color: #000;
            color: #000;
            background: #fafafa;
        }

        .all-btn { background: #222 !important; color: #fff !important; }
    </style>
</head>
<body>

    <img src="banner.jpg" class="home-banner" alt="Banner">

    <h1 class="home-title">Archive</h1>

    <div class="category-grid">
        <a href="ui-mods.html" class="cat-btn">UI DESIGN</a>
        <a href="function-mods.html" class="cat-btn">FUNCTION</a>
        <a href="cheat-mods.html" class="cat-btn">CHEATS</a>
        <a href="18plus.html" class="cat-btn">COLLECTION</a>
        <a href="all-mods.html" class="cat-btn all-btn">VIEW ALL</a>
    </div>

</body>
</html>
