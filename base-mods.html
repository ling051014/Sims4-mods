<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LING'S SIMS 4 MODS - 自訂義模組</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="nav-menu">
        <a href="index.html">首頁</a> <span style="color: #eee;">/</span> <a href="#" style="color: #000;">自訂義模組</a>
    </nav>

    <div class="mod-container">

        <div class="mod-card">
            <div class="preview-img"><img src="xml_injector.jpg" alt="Preview"></div>
            <div class="content">
                <h2 class="mod-header">XML INJECTOR<br>模組注入器</h2>
                <div class="author">BY <a href="https://scumbumbomods.com/xml-injector" target="_blank">SCUMBUMBO</a></div>
                <div class="details">
                    <div class="info-row"><strong>模組主體 ｜</strong><a href="#">XmlInjector_Script_v4.ts4script</a></div>
                    <div class="info-row"><strong>備用載點 ｜</strong>無</div>
                    <div class="info-row"><strong>下載版本 ｜</strong>v4.2</div>
                    <div class="info-row"><strong>下載日期 ｜</strong>2025.11.10</div>
                </div>
                <p class="notes">
                    它是一個可將自定義模組加載到遊戲中的輔助用模組。<br>
                    <br>
                    一般玩家只需要下載第一個檔案，<br>
                    在解壓縮之後保留「Script_v4」這個檔案即可。
                </p>
            </div>
        </div>

        <div class="mod-card">
            <div class="preview-img"><img src="lot51_core.jpg" alt="Preview"></div>
            <div class="content">
                <h2 class="mod-header">CORE LIBRARY<br>LOT51核心庫</h2>
                <div class="author">BY <a href="https://lot51.cc/core" target="_blank">LOT51</a></div>
                <div class="details">
                    <div class="info-row"><strong>檔案名稱 ｜</strong><a href="#">lot51_core.ts4script</a></div>
                    <div class="info-row"><strong>備用載點 ｜</strong>無</div>
                    <div class="info-row"><strong>下載版本 ｜</strong>1.43</div>
                    <div class="info-row"><strong>下載日期 ｜</strong>2026.05.05</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        /* 滾動動畫實作 */
        const observerOptions = { threshold: 0.1 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.mod-card').forEach(card => {
            observer.observe(card);
        });
    </script>
</body>
</html>
